name: Refresh CoinGecko cache

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run refresh_coingecko.py
        run: python refresh_coingecko.py

      - name: Commit coingecko_cache.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/coingecko_cache.json
          git diff --cached --quiet || git commit -m "chore: refresh CoinGecko cache"
          git push
